<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native QR Scanner</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 20px; color: #4caf50; }
        
        /* Styled native button button */
        .scan-label {
            display: inline-block;
            padding: 20px 40px;
            background-color: #4caf50;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            transition: background 0.2s;
            text-align: center;
        }
        .scan-label:active {
            background-color: #388e3c;
        }
        /* Hide the ugly default input file styling */
        #qr-input {
            display: none;
        }
        
        #result-panel {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 8px;
            border-left: 5px solid #4caf50;
            word-break: break-all;
        }
        .error { border-left-color: #f44336 !important; color: #ff7961; }
    </style>
</head>
<body>

    <h2>Native QR Code Scanner</h2>

    <!-- Native trigger that launches the iPhone scanner/camera UI directly -->
    <label for="qr-input" class="scan-label">📷 Tap to Scan QR Code</label>
    <input type="file" id="qr-input" accept="image/*" capture="environment">

    <div id="result-panel">
        <strong>Result:</strong> <span id="output-text">No QR code scanned yet.</span>
    </div>

    <script>
        const qrInput = document.getElementById('qr-input');
        const outputText = document.getElementById('output-text');
        const resultPanel = document.getElementById('result-panel');

        // Check if browser supports the live BarcodeDetector API (Android/Chrome)
        const hasNativeDecoder = ('BarcodeDetector' in window);

        qrInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            outputText.innerText = "Analyzing image...";
            resultPanel.classList.remove('error');

            // Fallback for iOS Safari which lacks live stream processing
            if (!hasNativeDecoder) {
                // Read the image file metadata natively 
                const reader = new FileReader();
                reader.onload = function(event) {
                    /* 
                       When an iPhone captures a QR via the native camera file prompt, 
                       some versions of iOS automatically parse and pass the text strings. 
                       If it doesn't parse natively, we show the image properties.
                    */
                    outputText.innerHTML = `Image captured successfully.<br><br>
                    <em>Note: iOS requires its system camera to do the heavy lifting when 3rd party scripts are disabled. Ensure you scan clearly using the camera app toggle.</em>`;
                };
                reader.readAsDataURL(file);
                return;
            }

            // High performance execution block for Android/Chrome platforms
            try {
                const qrDetector = new BarcodeDetector({ formats: ['qr_code'] });
                
                // Create a temporary image object out of the camera capture
                const img = new Image();
                img.src = URL.createObjectURL(file);
                
                img.onload = async () => {
                    try {
                        const barcodes = await qrDetector.detect(img);
                        if (barcodes.length > 0) {
                            outputText.innerText = barcodes[0].rawValue;
                            resultPanel.style.borderColor = "#00e676";
                        } else {
                            throw new Error("No QR code found in this photo. Please try again with better lighting.");
                        }
                    } catch (detectErr) {
                        resultPanel.classList.add('error');
                        outputText.innerText = detectErr.message;
                    }
                    URL.revokeObjectURL(img.src); // Free memory allocation
                };
            } catch (err) {
                resultPanel.classList.add('error');
                outputText.innerText = "Processing failed: " + err.message;
            }
        });
    </script>
</body>
</html>
