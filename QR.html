<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native QR Code Scanner</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; color: #4caf50; }
        .scanner-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background: #1e1e1e;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Visual scanner guide overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-sizing: border-box;
            border: 4px solid transparent;
            pointer-events: none;
        }
        .scanner-box {
            position: absolute;
            top: 15%; left: 15%; width: 70%; height: 70%;
            border: 3px dashed rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            box-sizing: border-box;
        }
        #result-panel {
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 8px;
            border-left: 5px solid #4caf50;
            word-break: break-all;
        }
        .error { border-left-color: #f44336 !important; color: #ff7961; }
        .fallback-msg { padding: 20px; text-align: center; color: #ffb74d; }
    </style>
</head>
<body>

    <h2>Native QR Scanner</h2>
    <div class="scanner-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="overlay">
            <div class="scanner-box"></div>
        </div>
    </div>

    <div id="result-panel">
        <strong>Result:</strong> <span id="output-text">Waiting for QR code...</span>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const outputText = document.getElementById('output-text');
        const resultPanel = document.getElementById('result-panel');

        // 1. Check Browser Support for the Native BarcodeDetector API
        if (!('BarcodeDetector' in window)) {
            resultPanel.classList.add('error');
            outputText.innerHTML = `
                <strong>Unsupported Browser.</strong><br><br>
                The native <code>BarcodeDetector</code> API is not supported or enabled in this browser.<br><br>
                <em>Note: As of 2026, it is supported out-of-the-box in Chrome, Edge, and Opera. For Safari/Firefox, you may need to enable "Shape Detection API" flags, or use HTTPS.</em>
            `;
        } else {
            // Initialize detector specifically looking for QR codes
            const qrDetector = new BarcodeDetector({ formats: ['qr_code'] });
            startCameraAndScan(qrDetector);
        }

        // 2. Request Camera access and start the detection loop
        async function startCameraAndScan(detector) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment", // Use back camera if available
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                // Wait for video metadata to load before starting the loop
                video.onloadedmetadata = () => {
                    renderLoop(detector);
                };
            } catch (err) {
                resultPanel.classList.add('error');
                outputText.innerText = "Camera access denied or unavailable: " + err.message;
            }
        }

        // 3. High-performance scan loop running at maximum frame rate
        async function renderLoop(detector) {
            // Check if video frame is ready to be processed
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                try {
                    // Detect barcodes/QR codes in the raw video frame
                    const barcodes = await detector.detect(video);
                    
                    if (barcodes.length > 0) {
                        // Successfully found a QR code! 
                        // It natively tracks coordinates, allowing any angle.
                        const qrCode = barcodes[0]; 
                        outputText.innerText = qrCode.rawValue;
                        
                        // Optional styling cue for a successful scan
                        resultPanel.style.borderColor = "#00e676"; 
                    } else {
                        resultPanel.style.borderColor = "#4caf50";
                    }
                } catch (e) {
                    console.error("Detection error: ", e);
                }
            }
            // Recall the loop recursively on the next animation frame (~60fps)
            requestAnimationFrame(() => renderLoop(detector));
        }
    </script>
</body>
</html>
